<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine-Bank Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #fff;
    padding: 30px;
    width: 340px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.main-btn {
    background: black;
    color: white;
}

.main-btn:hover { background: #333; }

.google-btn {
    background: white;
    border: 1px solid #ccc;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.google-btn img {
    width: 20px;
}

.msg {
    font-size: 12px;
    margin-top: 10px;
    min-height: 15px;
}

.error { color: red; }
.success { color: green; }

hr { margin: 18px 0; }
</style>

</head>

<body>

<div class="card">
    <h2>Fine-Bank</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="main-btn" onclick="register()">Create Account</button>
    <button class="main-btn" onclick="login()">Login</button>

    <hr>

    <button class="google-btn" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
        Sign in with Google
    </button>

    <p id="msg" class="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-fQhdRiyan8waGagWJcCLTqqr5c8jN3Q",
  authDomain: "finebankdatabase.firebaseapp.com",
  projectId: "finebankdatabase",
  storageBucket: "finebankdatabase.firebasestorage.app",
  messagingSenderId: "769582800876",
  appId: "1:769582800876:web:d9ad55f0b8a94f7a6e2ac9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const msg = document.getElementById("msg");
const email = document.getElementById("email");
const password = document.getElementById("password");

function show(text, type) {
    msg.innerText = text;
    msg.className = "msg " + type;
}

// auto redirect if logged in
onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "index.html";
});

window.register = async function () {
    try {
        const cred = await createUserWithEmailAndPassword(
            auth,
            email.value,
            password.value
        );

        await setDoc(doc(db, "users", cred.user.uid), {
            email: cred.user.email,
            balance: 100,
            history: [],
            lastReward: 0
        });

        show("Account created!", "success");
    } catch (e) {
        show(e.message, "error");
    }
};

window.login = async function () {
    try {
        await signInWithEmailAndPassword(auth, email.value, password.value);
        window.location.href = "index.html";
    } catch (e) {
        show("Invalid login", "error");
    }
};

window.googleLogin = async function () {
    try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);

        const user = result.user;
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
            await setDoc(ref, {
                email: user.email,
                balance: 100,
                history: [],
                lastReward: 0
            });
        }

        window.location.href = "index.html";
    } catch (e) {
        show(e.message, "error");
    }
};
</script>

</body>
</html>
