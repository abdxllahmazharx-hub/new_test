<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fine-Bank</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
}

.header {
    background: #111;
    color: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.card {
    background: white;
    width: 360px;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.balance-box {
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    color: white;
    padding: 18px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 15px;
}

.balance-box span {
    font-size: 26px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 11px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.primary { background: black; color: white; }
.primary:hover { background: #333; }

.success { background: #27ae60; color: white; }
.danger { background: #c0392b; color: white; }

.row { display: flex; gap: 8px; }

.history {
    height: 120px;
    overflow-y: auto;
    background: #f0f0f0;
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
}

.msg {
    text-align: center;
    font-size: 12px;
    margin-top: 8px;
    min-height: 15px;
}

.error { color: red; }
.success-msg { color: green; }
</style>

</head>

<body>

<div class="header">
    <div>Fine-Bank</div>
    <div id="userEmail">Loading...</div>
</div>

<div class="container">
<div class="card">

<div class="balance-box">
Balance<br>
$<span id="bal">0</span>
</div>

<select id="acc"></select>

<input id="amt" type="number" placeholder="Enter amount">

<div class="row">
<button class="primary" onclick="deposit()">Deposit</button>
<button class="primary" onclick="withdraw()">Withdraw</button>
</div>

<button class="primary" onclick="transfer()">Transfer</button> <button class="success" onclick="daily()">Claim Daily $50</button>

<div class="history" id="hist"></div>

<button class="danger" onclick="logout()">Logout</button>

<p id="msg" class="msg"></p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEAVcUrqN1RZGm_eCVTwTxVryfUpj9YRQ",
  authDomain: "bankdatabaseofficial.firebaseapp.com",
  projectId: "bankdatabaseofficial",
  storageBucket: "bankdatabaseofficial.firebasestorage.app",
  messagingSenderId: "171337934322",
  appId: "1:171337934322:web:7bd324dc985b6db019f76b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = null;
let data = null;

const bal = document.getElementById("bal");
const acc = document.getElementById("acc");
const amt = document.getElementById("amt");
const msg = document.getElementById("msg");
const hist = document.getElementById("hist");
const email = document.getElementById("userEmail");

// dummy bank accounts
const accounts = {
  "ACC1001": 500,
  "ACC1002": 1200,
  "ACC1003": 300
};

// 🔐 AUTH
onAuthStateChanged(auth, async (user) => {
  if (!user) return window.location.replace("login.html");

  uid = user.uid;
  email.innerText = user.email;

  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  // 🔥 AUTO CREATE USER (IMPORTANT FIX)
  if (!snap.exists()) {
    await setDoc(ref, {
      balance: 100,
      history: [],
      lastReward: 0
    });
  }

  listenData();
  loadAccounts();
});

// 📡 LIVE DATA
function listenData() {
  const ref = doc(db, "users", uid);

  onSnapshot(ref, (snap) => {
    data = snap.data();

    bal.innerText = data.balance || 0;

    hist.innerHTML = (data.history || []).length
      ? data.history.join("<br>")
      : "No transactions.";
  });
}

// 📦 ACCOUNTS
function loadAccounts() {
  acc.innerHTML = "";
  Object.keys(accounts).forEach(k => {
    let opt = document.createElement("option");
    opt.value = k;
    opt.innerText = `${k} ($${accounts[k]})`;
    acc.appendChild(opt);
  });
}

// 📢 MESSAGE
function show(t, c) {
  msg.innerText = t;
  msg.className = "msg " + c;
}

function getAmt() {
  return Number(amt.value);
}

// 💰 DEPOSIT
window.deposit = async function () {
  if (!data) return;

  let a = getAmt();
  if (a <= 0) return show("Invalid amount","error");

  const ref = doc(db, "users", uid);

  await updateDoc(ref, {
    balance: (data.balance || 0) + a,
    history: [`Deposited $${a}`, ...(data.history || [])]
  });

  amt.value = "";
};

// 💸 WITHDRAW
window.withdraw = async function () {
  if (!data) return;

  let a = getAmt();
  if (a <= 0) return show("Invalid amount","error");
  if (a > data.balance) return show("Not enough balance","error");

  const ref = doc(db, "users", uid);

  await updateDoc(ref, {
    balance: data.balance - a,
    history: [`Withdrew $${a}`, ...(data.history || [])]
  });

  amt.value = "";
};

// 🔁 TRANSFER
window.transfer = async function () {
  if (!data) return;

  let a = getAmt();
  if (a <= 0) return show("Invalid amount","error");

  const ref = doc(db, "users", uid);

  await updateDoc(ref, {
    balance: (data.balance || 0) - a,
    history: [`Transferred $${a}`, ...(data.history || [])]
  });

  amt.value = "";
};

// 🎁 DAILY REWARD
window.daily = async function () {
  if (!data) return;

  let now = Date.now();
  let last = data.lastReward || 0;

  if (now - last < 86400000)
    return show("Come back tomorrow","error");

  const ref = doc(db, "users", uid);

  await updateDoc(ref, {
    balance: (data.balance || 0) + 50,
    lastReward: now,
    history: ["Daily reward +$50", ...(data.history || [])]
  });
};

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth);
};
</script>
