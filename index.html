<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fine-Bank</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
}

.header {
  background: #111;
  color: white;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
}

.container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.card {
  background: white;
  width: 360px;
  padding: 25px;
  border-radius: 16px;
}

.balance-box {
  background: linear-gradient(135deg, #2c3e50, #4ca1af);
  color: white;
  padding: 18px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 11px;
  margin-top: 10px;
  border: none;
  cursor: pointer;
}

.primary { background: black; color: white; }
.success { background: green; color: white; }
.danger { background: red; color: white; }

.history {
  height: 120px;
  overflow-y: auto;
  background: #eee;
  padding: 8px;
}

.msg { font-size: 12px; }
.error { color: red; }
.success-msg { color: green; }
</style>
</head>

<body>

<div class="header">
  <div>Fine-Bank</div>
  <div id="userEmail">Loading...</div>
</div>

<div class="container">
<div class="card">

<div class="balance-box">
Balance<br>
$<span id="bal">0</span>
</div>

<select id="acc"></select>
<input id="amt" type="number" placeholder="Enter amount">

<div class="history" id="hist"></div>

<button class="primary" onclick="deposit()">Deposit</button>
<button class="primary" onclick="withdraw()">Withdraw</button>
<button class="primary" onclick="transfer()">Transfer</button>
<button class="success" onclick="daily()">Claim Daily $50</button>
<button class="danger" onclick="logout()">Logout</button>

<p id="msg" class="msg"></p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-fQhdRiyan8waGagWJcCLTqqr5c8jN3Q",
  authDomain: "finebankdatabase.firebaseapp.com",
  projectId: "finebankdatabase",
  storageBucket: "finebankdatabase.firebasestorage.app",
  messagingSenderId: "769582800876",
  appId: "1:769582800876:web:d9ad55f0b8a94f7a6e2ac9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = null;
let userData = {
  balance: 0,
  accounts: {
    ACC1001: 500,
    ACC1002: 1200,
    ACC1003: 300
  },
  history: [],
  lastReward: 0
};

const bal = document.getElementById("bal");
const email = document.getElementById("userEmail");
const acc = document.getElementById("acc");
const amt = document.getElementById("amt");
const msg = document.getElementById("msg");
const hist = document.getElementById("hist");

function show(t, type){
  msg.innerText = t;
  msg.className = "msg " + type;
}

function getAmt(){ return Number(amt.value); }
function getAcc(){ return acc.value; }

function loadAccounts(){
  acc.innerHTML = "";
  Object.keys(userData.accounts).forEach(k=>{
    let opt = document.createElement("option");
    opt.value = k;
    opt.textContent = `${k} ($${userData.accounts[k]})`;
    acc.appendChild(opt);
  });
}

let authReady = false;

onAuthStateChanged(auth, (user) => {
  if (!authReady) authReady = true;

  if (!user) {
    window.location.replace("login.html");
    return;
  }

  uid = user.uid;
  email.innerText = user.email;

  const ref = doc(db, "users", uid);

  onSnapshot(ref, (snap) => {
    if (snap.exists()) {
      userData = snap.data();
    }

    bal.innerText = userData.balance || 0;
    loadAccounts();

    hist.innerHTML = (userData.history || []).length
      ? userData.history.join("<br>")
      : "No transactions";
  });
});

// 💰 DEPOSIT
window.deposit = async function(){
  let a = getAmt();
  let accId = getAcc();

  if(!a || a<=0) return show("Invalid amount","error");
  if(userData.accounts[accId] < a)
    return show("Not enough in account","error");

  userData.accounts[accId] -= a;
  userData.balance += a;

  userData.history.unshift(`Deposited $${a} from ${accId}`);

  await setDoc(doc(db,"users",uid),userData,{merge:true});
  show("Deposit success","success-msg");
};

// 💸 WITHDRAW
window.withdraw = async function(){
  let a = getAmt();
  let accId = getAcc();

  if(!a || a<=0) return show("Invalid amount","error");
  if(userData.balance < a) return show("Not enough balance","error");

  userData.balance -= a;
  userData.accounts[accId] += a;

  userData.history.unshift(`Withdrew $${a}`);

  await setDoc(doc(db,"users",uid),userData,{merge:true});
  show("Withdraw success","success-msg");
};

// 🔁 TRANSFER
window.transfer = async function(){
  let a = getAmt();
  let accId = getAcc();

  if(!a || a<=0) return show("Invalid amount","error");
  if(userData.balance < a) return show("Not enough balance","error");

  userData.balance -= a;
  userData.accounts[accId] += a;

  userData.history.unshift(`Transferred $${a} to ${accId}`);

  await setDoc(doc(db,"users",uid),userData,{merge:true});
  show("Transfer success","success-msg");
};

// 🎁 DAILY
window.daily = async function(){
  let now = Date.now();

  if(now - (userData.lastReward||0) < 86400000)
    return show("Already claimed","error");

  userData.balance += 50;
  userData.lastReward = now;

  userData.history.unshift("Daily +$50");

  await setDoc(doc(db,"users",uid),userData,{merge:true});
  show("Daily reward added","success-msg");
};

// 🚪 LOGOUT
window.logout = () => signOut(auth);
</script>

</body>
</html>
