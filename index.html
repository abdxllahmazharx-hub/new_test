<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fine-Bank</title>

<style>
body { font-family: Arial; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.box { background: white; padding: 20px; width: 350px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; }
input, button, select { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; }
button { background: black; color: white; border: none; cursor: pointer; font-weight: bold; }
button:hover { background: #333; }
.balance { text-align: center; font-size: 20px; margin: 10px 0; font-weight: bold; color: #2c3e50; }
.history { height: 100px; overflow-y: auto; font-size: 12px; background: #eee; padding: 5px; border: 1px solid #ddd; margin-top: 10px;}
.msg { font-size: 12px; margin-top: 5px; min-height: 15px; text-align: center; }
.error { color: red; }
.success { color: green; }
h2, h3 { margin: 10px 0; text-align: center; }

.user-email {
    position: absolute;
    top: 10px;
    left: 15px;
    font-size: 11px;
    color: #555;
}
</style>

</head>

<body>

<div class="box">
    <div class="user-email" id="userEmail">Loading...</div>

```
<h2>Fine-Bank</h2>

<div class="balance">Your Balance: $<span id="bal">0</span></div>

<label style="font-size: 12px;">Select Bank Account:</label>
<select id="acc"></select>

<input id="amt" type="number" placeholder="Enter amount">

<div style="display: flex; gap: 5px;">
    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>
</div>

<button onclick="transfer()">Transfer</button>
<button onclick="daily()" style="background: #27ae60;">Claim Daily $50</button>

<h3>History</h3>
<div class="history" id="hist"></div>

<button onclick="logout()" style="background: #c0392b;">Logout</button>
<p id="msg" class="msg"></p>
```

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEAVcUrqN1RZGm_eCVTwTxVryfUpj9YRQ",
  authDomain: "bankdatabaseofficial.firebaseapp.com",
  projectId: "bankdatabaseofficial",
  storageBucket: "bankdatabaseofficial.firebasestorage.app",
  messagingSenderId: "171337934322",
  appId: "1:171337934322:web:7bd324dc985b6db019f76b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = null;

// shared demo accounts
let accounts = {
    "ACC1001": 500,
    "ACC1002": 1200,
    "ACC1003": 300
};

// 🔐 PROTECT PAGE
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.replace("login.html");
        return;
    }

    currentUser = user.uid;
    userEmail.innerText = user.email;

    loadData();
});

function loadData() {
    const ref = doc(db, "users", currentUser);

    onSnapshot(ref, (snap) => {
        userData = snap.data();

        bal.innerText = userData.balance;

        hist.innerHTML = userData.history.length
            ? userData.history.join("<br>")
            : "No transactions.";

        updateAccountsUI();
    });
}

function updateAccountsUI() {
    let current = acc.value;
    acc.innerHTML = "";

    for (let k in accounts) {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = `${k} (Bank: $${accounts[k]})`;
        acc.appendChild(opt);
    }

    if (current) acc.value = current;
}

function show(text, type) {
    msg.innerText = text;
    msg.className = "msg " + type;
}

window.deposit = async function() {
    let a = Number(amt.value);
    let target = acc.value;

    if (a <= 0 || isNaN(a)) return show("Invalid amount","error");
    if (a > accounts[target]) return show("Bank has less money","error");

    const ref = doc(db, "users", currentUser);
    const snap = await getDoc(ref);
    let data = snap.data();

    accounts[target] -= a;

    await updateDoc(ref, {
        balance: data.balance + a,
        history: [`Deposited $${a} from ${target}`, ...data.history],
    });

    amt.value = "";
};

window.withdraw = async function() {
    let a = Number(amt.value);

    if (a <= 0 || isNaN(a)) return show("Invalid amount","error");
    if (a > userData.balance) return show("Not enough balance","error");

    const ref = doc(db, "users", currentUser);

    accounts[acc.value] += a;

    await updateDoc(ref, {
        balance: userData.balance - a,
        history: [`Withdrew $${a} to ${acc.value}`, ...userData.history],
    });

    amt.value = "";
};

window.transfer = function() {
    deposit();
};

window.daily = async function() {
    let now = Date.now();

    if (now - userData.lastReward < 86400000)
        return show("Come back tomorrow","error");

    const ref = doc(db, "users", currentUser);

    await updateDoc(ref, {
        balance: userData.balance + 50,
        lastReward: now,
        history: ["Daily reward +$50", ...userData.history],
    });

    show("Reward claimed","success");
};

window.logout = function() {
    signOut(auth);
};
</script>

</body>
</html>
