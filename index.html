<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fine-Bank</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
}

.header {
  background: #111;
  color: white;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.card {
  background: white;
  width: 360px;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.balance-box {
  background: linear-gradient(135deg, #2c3e50, #4ca1af);
  color: white;
  padding: 18px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 15px;
}

.balance-box span {
  font-size: 26px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 11px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: black; color: white; }
.success { background: #27ae60; color: white; }
.danger { background: #c0392b; color: white; }

.row { display: flex; gap: 8px; }

.history {
  height: 120px;
  overflow-y: auto;
  background: #f0f0f0;
  border-radius: 8px;
  padding: 8px;
  font-size: 12px;
}

.msg {
  text-align: center;
  font-size: 12px;
  margin-top: 8px;
  min-height: 15px;
}

.error { color: red; }
.success-msg { color: green; }
</style>
</head>

<body>

<div class="header">
  <div>Fine-Bank</div>
  <div id="userEmail">Loading...</div>
</div>

<div class="container">
<div class="card">

<div class="balance-box">
Balance<br>
$<span id="bal">0</span>
</div>

<select id="acc"></select>
<input id="amt" type="number" placeholder="Enter amount">

<div class="row">
<button class="primary" onclick="deposit()">Deposit</button>
<button class="primary" onclick="withdraw()">Withdraw</button>
</div>

<button class="primary" onclick="transfer()">Transfer</button>
<button class="success" onclick="daily()">Claim Daily $50</button>

<div class="history" id="hist"></div>

<button class="danger" onclick="logout()">Logout</button>

<p id="msg" class="msg"></p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-fQhdRiyan8waGagWJcCLTqqr5c8jN3Q",
  authDomain: "finebankdatabase.firebaseapp.com",
  projectId: "finebankdatabase",
  storageBucket: "finebankdatabase.firebasestorage.app",
  messagingSenderId: "769582800876",
  appId: "1:769582800876:web:d9ad55f0b8a94f7a6e2ac9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = { balance: 0, history: [], lastReward: 0 };

const bal = document.getElementById("bal");
const email = document.getElementById("userEmail");
const acc = document.getElementById("acc");
const amt = document.getElementById("amt");
const msg = document.getElementById("msg");
const hist = document.getElementById("hist");

const accounts = {
  "ACC1001": 500,
  "ACC1002": 1200,
  "ACC1003": 300
};

function show(t, type) {
  msg.innerText = t;
  msg.className = "msg " + type;
}

function getAmt() {
  return Number(amt.value);
}

function getAcc() {
  return acc.value;
}

function loadAccounts() {
  acc.innerHTML = "";
  Object.keys(accounts).forEach(k => {
    let opt = document.createElement("option");
    opt.value = k;
    opt.textContent = `${k} ($${accounts[k]})`;
    acc.appendChild(opt);
  });
}

onAuthStateChanged(auth, (user) => {
  if (!user) return window.location.replace("login.html");

  currentUser = user.uid;
  email.innerText = user.email;

  const ref = doc(db, "users", currentUser);

  onSnapshot(ref, (snap) => {
    if (snap.exists()) {
      userData = snap.data();
    }

    bal.innerText = userData.balance || 0;

    hist.innerHTML = (userData.history || []).length
      ? userData.history.join("<br>")
      : "No transactions.";
  });

  loadAccounts();
});

// 💰 DEPOSIT
window.deposit = async function () {
  let a = getAmt();
  let target = getAcc();

  if (!a || a <= 0) return show("Invalid amount", "error");

  userData.balance += a;

  const ref = doc(db, "users", currentUser);

  await setDoc(ref, userData, { merge: true });

  userData.history.unshift(`Deposited $${a} from ${target}`);
  show("Deposit successful!", "success-msg");
  amt.value = "";
};

// 💸 WITHDRAW
window.withdraw = async function () {
  let a = getAmt();

  if (!a || a <= 0) return show("Invalid amount", "error");
  if (a > userData.balance) return show("Not enough balance", "error");

  userData.balance -= a;

  const ref = doc(db, "users", currentUser);

  userData.history.unshift(`Withdrew $${a}`);

  await setDoc(ref, userData, { merge: true });

  show("Withdrawal successful!", "success-msg");
  amt.value = "";
};

// 🔁 TRANSFER
window.transfer = async function () {
  let a = getAmt();
  let target = getAcc();

  if (!a || a <= 0) return show("Invalid amount", "error");
  if (a > userData.balance) return show("Not enough balance", "error");

  userData.balance -= a;

  const ref = doc(db, "users", currentUser);

  userData.history.unshift(`Transferred $${a} to ${target}`);

  await setDoc(ref, userData, { merge: true });

  show("Transfer successful!", "success-msg");
  amt.value = "";
};

// 🎁 DAILY
window.daily = async function () {
  let now = Date.now();

  if (now - (userData.lastReward || 0) < 86400000)
    return show("Come back tomorrow", "error");

  userData.balance += 50;
  userData.lastReward = now;

  const ref = doc(db, "users", currentUser);

  userData.history.unshift("Daily reward +$50");

  await setDoc(ref, userData, { merge: true });

  show("Daily reward claimed!", "success-msg");
};

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
