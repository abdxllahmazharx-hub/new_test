<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fine-Bank</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #141e30, #243b55);
}

.header {
    background: #111;
    color: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.card {
    background: white;
    width: 360px;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.balance-box {
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    color: white;
    padding: 18px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 15px;
}

.balance-box span {
    font-size: 26px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 11px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.primary { background: black; color: white; }
.primary:hover { background: #333; }

.success { background: #27ae60; color: white; }
.danger { background: #c0392b; color: white; }

.row { display: flex; gap: 8px; }

.history {
    height: 120px;
    overflow-y: auto;
    background: #f0f0f0;
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
    margin-top: 10px;
}

.msg {
    text-align: center;
    font-size: 12px;
    margin-top: 8px;
}

.error { color: red; }
.success-msg { color: green; }
</style>

</head>

<body>

<div class="header">
    <div>Fine-Bank</div>
    <div id="userEmail">Loading...</div>
</div>

<div class="container">
<div class="card">

```
<div class="balance-box">
    Balance<br>
    $<span id="bal">0</span>
</div>

<!-- FIXED: dropdown ALWAYS loads -->
<select id="acc"></select>

<input id="amt" type="number" placeholder="Enter amount">

<div class="row">
    <button class="primary" onclick="deposit()">Deposit</button>
    <button class="primary" onclick="withdraw()">Withdraw</button>
</div>

<button class="primary" onclick="transfer()">Transfer</button>
<button class="success" onclick="daily()">Claim Daily $50</button>

<div class="history" id="hist"></div>

<button class="danger" onclick="logout()">Logout</button>

<p id="msg" class="msg"></p>
```

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEAVcUrqN1RZGm_eCVTwTxVryfUpj9YRQ",
  authDomain: "bankdatabaseofficial.firebaseapp.com",
  projectId: "bankdatabaseofficial",
  storageBucket: "bankdatabaseofficial.firebasestorage.app",
  messagingSenderId: "171337934322",
  appId: "1:171337934322:web:7bd324dc985b6db019f76b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = null;

// FIXED BANK ACCOUNTS (always loaded once)
const accounts = {
    "ACC1001": 500,
    "ACC1002": 1200,
    "ACC1003": 300
};

// auth guard
onAuthStateChanged(auth, (user) => {
    if (!user) return window.location.replace("login.html");

    currentUser = user.uid;
    userEmail.innerText = user.email;
    loadData();
});

function loadData() {
    const ref = doc(db, "users", currentUser);

    onSnapshot(ref, (snap) => {
        userData = snap.data();

        bal.innerText = userData.balance;

        hist.innerHTML = userData.history.length
            ? userData.history.join("<br>")
            : "No transactions.";

        updateAccountsUI();
    });
}

// 🔥 FIXED: dropdown ALWAYS shows accounts correctly
function updateAccountsUI() {
    acc.innerHTML = "";

    Object.keys(accounts).forEach(k => {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = `${k} ($${accounts[k]})`;
        acc.appendChild(opt);
    });
}

function show(text, type) {
    msg.innerText = text;
    msg.className = "msg " + type;
}

window.deposit = async function() {
    let a = Number(amt.value);
    let target = acc.value;

    if (!a || a <= 0) return show("Invalid amount","error");
    if (a > accounts[target]) return show("Bank has less money","error");

    const ref = doc(db, "users", currentUser);
    const snap = await getDoc(ref);
    let data = snap.data();

    accounts[target] -= a;

    await updateDoc(ref, {
        balance: data.balance + a,
        history: [`Deposited $${a} from ${target}`, ...data.history],
    });

    amt.value = "";
};

window.withdraw = async function() {
    let a = Number(amt.value);

    if (!a || a <= 0) return show("Invalid amount","error");
    if (a > userData.balance) return show("Not enough balance","error");

    const ref = doc(db, "users", currentUser);

    accounts[acc.value] += a;

    await updateDoc(ref, {
        balance: userData.balance - a,
        history: [`Withdrew $${a} to ${acc.value}`, ...userData.history],
    });

    amt.value = "";
};

window.transfer = function() {
    deposit();
};

window.daily = async function() {
    let now = Date.now();

    if (now - userData.lastReward < 86400000)
        return show("Come back tomorrow","error");

    const ref = doc(db, "users", currentUser);

    await updateDoc(ref, {
        balance: userData.balance + 50,
        lastReward: now,
        history: ["Daily reward +$50", ...userData.history],
    });

    show("Reward claimed","success");
};

window.logout = function() {
    signOut(auth);
};
</script>

</body>
</html>
